<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>__TITLE__</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="layout">
    <header class="topbar panel">
      <div>
        <h1 id="title">__TITLE__</h1>
        <p class="sub">Bimanual telemetry dashboard</p>
      </div>
      <div class="status-wrap">
        <span id="stream-status" class="pill">connecting</span>
      </div>
    </header>

    <section class="panel controls">
      <div class="control-group">
        <label for="history-s">History (s)</label>
        <input id="history-s" type="number" min="1" step="1" />
      </div>
      <form id="control-form" class="control-form">
        <label for="control-text">Teleop message</label>
        <div class="control-row">
          <input id="control-text" type="text" placeholder="collect_trajectory start" />
          <button type="submit">Send</button>
        </div>
      </form>
      <div id="control-result" class="control-result"></div>
    </section>

    <section class="panel">
      <div class="section-head">
        <h2>Follower</h2>
        <span id="follower-status" class="small-status">not connected</span>
      </div>
      <div class="arm-grid">
        <div>
          <h3>Left</h3>
          <div id="follower-left" class="cards"></div>
        </div>
        <div>
          <h3>Right</h3>
          <div id="follower-right" class="cards"></div>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="section-head">
        <h2>Leader</h2>
        <span id="leader-status" class="small-status">not connected</span>
      </div>
      <div class="arm-grid">
        <div>
          <h3>Left</h3>
          <div id="leader-left" class="cards"></div>
        </div>
        <div>
          <h3>Right</h3>
          <div id="leader-right" class="cards"></div>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="section-head">
        <h2>Cameras</h2>
        <span id="camera-status" class="small-status">not connected</span>
      </div>
      <div id="camera-grid" class="camera-grid"></div>
    </section>
  </main>

  <script id="plot-config" type="application/json">__CONFIG_JSON__</script>
  <script defer src="/static/app.js"></script>
</body>
</html>
